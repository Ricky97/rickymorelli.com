<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ricky — A</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&display=swap" rel="stylesheet" />
<style>
  :root{ --bg:#e8e6df; --ink:#111; --acc:#ff3b1f; }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'Anton',sans-serif; cursor:none;
    position:relative;
  }

  /* scrolling marquee rows */
  .rows{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;gap:0;z-index:1;}
  .row{white-space:nowrap;font-size:18vh;line-height:0.9;text-transform:uppercase;
       opacity:0.10;letter-spacing:0.02em;will-change:transform;}
  .row span{padding-right:0.25em;}
  .row.a{animation:slideL 18s linear infinite;}
  .row.b{animation:slideR 22s linear infinite;}
  .row.c{animation:slideL 26s linear infinite;}
  @keyframes slideL{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  @keyframes slideR{from{transform:translateX(-50%)}to{transform:translateX(0)}}

  /* hero word */
  .hero{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:2;}
  .hero h1{
    font-family:'Archivo Black',sans-serif;
    font-size:clamp(5rem,26vw,22rem);
    letter-spacing:-0.04em;text-transform:uppercase;line-height:0.8;
    color:var(--ink);
  }
  .hero h1 .o{color:var(--acc);}

  /* cursor spotlight: invert everything inside the disc */
  .spot{
    position:fixed;top:0;left:0;width:240px;height:240px;border-radius:50%;
    margin:-120px 0 0 -120px;background:var(--ink);z-index:5;pointer-events:none;
    mix-blend-mode:difference;transition:width .25s,height .25s,margin .25s;
    will-change:transform;
  }
  body:active .spot{width:340px;height:340px;margin:-170px 0 0 -170px;}

  .tag{position:fixed;bottom:5vh;left:0;right:0;text-align:center;z-index:3;
       font-family:'Archivo Black',sans-serif;font-size:clamp(10px,1.4vw,14px);
       letter-spacing:0.5em;text-transform:uppercase;opacity:0.55;padding-left:0.5em;}
</style>
</head>
<body>
  <div class="rows" id="rows"></div>
  <div class="hero"><h1>RICK<span class="o">Y</span></h1></div>
  <div class="tag">Ricky&nbsp;Morelli</div>
  <div class="spot" id="spot"></div>
  <script>
    var word='RICKY&nbsp;';
    var rows=document.getElementById('rows');
    var cls=['a','b','c'];
    for(var i=0;i<7;i++){
      var d=document.createElement('div');
      d.className='row '+cls[i%3];
      d.innerHTML='<span>'+word.repeat(16)+'</span>';
      rows.appendChild(d);
    }
    var spot=document.getElementById('spot'),x=innerWidth/2,y=innerHeight/2,tx=x,ty=y;
    addEventListener('pointermove',function(e){tx=e.clientX;ty=e.clientY;});
    (function loop(){x+=(tx-x)*0.18;y+=(ty-y)*0.18;
      spot.style.transform='translate('+x+'px,'+y+'px)';requestAnimationFrame(loop);})();
  </script>
</body>
</html>
